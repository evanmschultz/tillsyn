name: ci

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  test-matrix:
    name: ci (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Mage
        shell: bash
        run: |
          go install github.com/magefile/mage@v1.17.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run CI pipeline
        shell: bash
        run: mage ci

  release-snapshot-check:
    name: release snapshot check
    runs-on: ubuntu-latest
    needs: test-matrix
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify required entrypoint sources are tracked
        run: git ls-files --error-unmatch magefile.go cmd/till/main.go cmd/till/main_test.go
      - name: Validate goreleaser snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --snapshot --clean --skip=publish
