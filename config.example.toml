# tillsyn example configuration
#
# Resolution order:
# 1) CLI flags (--config, --db, --app, --dev)
# 2) Environment (TILL_CONFIG, TILL_DB_PATH, TILL_APP_NAME, TILL_DEV_MODE)
# 3) This TOML file
# 4) Platform defaults (use `till paths` to print active paths)
#
# Dev mode stores data under "<app>-dev" so local builds do not clash with released installs.

[database]
# Leave empty to use platform defaults; set explicit path to pin DB location.
path = ""

[delete]
# archive | hard
default_mode = "archive"

[confirm]
# Confirmation gates for state-changing/destructive actions.
delete = true
archive = true
hard_delete = true
restore = false

[task_fields]
show_priority = true
show_due_date = true
show_labels = true
show_description = false

[board]
show_wip_warnings = true
# none | priority | state
group_by = "none"

[search]
# When true, `/` can search across all projects.
cross_project = false
include_archived = false
# Canonical lifecycle states only: todo | progress | done | archived.
states = ["todo", "progress", "done"]

[embeddings]
# Enable semantic/hybrid search indexing and retrieval.
enabled = false
# Current provider support: openai
provider = "openai"
model = "text-embedding-3-small"
# API key environment variable read at startup when embeddings are enabled.
api_key_env = "OPENAI_API_KEY"
# Optional OpenAI-compatible base URL override.
base_url = ""
# Optional embedding dimensions override (0 uses model default).
dimensions = 0
# Candidate window size for semantic retrieval before app-level filtering/ranking.
query_top_k = 200
# Hybrid rank weights (normalized at runtime).
lexical_weight = 0.55
semantic_weight = 0.45

[identity]
# Immutable runtime identity token; auto-generated on first TUI startup if empty.
actor_id = ""
# Display name used for default actor identity in prompts and logs.
display_name = ""
# user | agent | system
default_actor_type = "user"

[paths]
# Global filesystem roots used for search/picker defaults.
search_roots = []

[ui]
# Durations used for "due soon" badges and summary counts.
due_soon_windows = ["24h", "1h"]
show_due_summary = true

[logging]
# debug | info | warn | error | fatal
level = "info"

[logging.dev_file]
# When true in --dev mode, runtime logs are also written to a local file sink.
enabled = true
# The default sentinel resolves to the shared runtime root logs directory.
# Explicit relative overrides are resolved from the current workspace directory.
dir = ".tillsyn/log"

[project_roots]
# Machine-local root mappings by project slug. Keep these in TOML so DB exports stay portable.
# Example:
# inbox = "/Users/you/dev/inbox-repo"

[labels]
# Suggested labels available across all projects.
global = ["planning", "bug", "chore"]
# When true, task labels must come from global + project-specific allowlists.
enforce_allowed = false

[labels.projects]
# Per-project suggested labels, keyed by project slug.
inbox = ["till", "roadmap", "ux"]

[keys]
command_palette = ":"
quick_actions = "."
multi_select = "space"
activity_log = "g"
undo = "z"
redo = "Z"
