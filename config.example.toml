# tillsyn example configuration
#
# Resolution order:
# 1) CLI flags (--config, --db, --home, --app, --dev)
# 2) Environment (TILL_CONFIG, TILL_DB_PATH, TILL_HOME, TILL_APP_NAME, TILL_DEV_MODE)
# 3) This TOML file
# 4) Platform defaults (use `till paths` to print active paths)
#
# Stable installs default to "$HOME/.tillsyn" (or ".$APP" for non-default app names).
# Dev mode defaults to a repo-local runtime home such as "./.tillsyn" unless --home / TILL_HOME overrides it.

[database]
# Leave empty to use platform defaults; set explicit path to pin DB location.
path = ""

[delete]
# archive | hard
default_mode = "archive"

[confirm]
# Confirmation gates for state-changing/destructive actions.
delete = true
archive = true
hard_delete = true
restore = false

[task_fields]
show_priority = true
show_due_date = true
show_labels = true
show_description = false

[board]
show_wip_warnings = true
# none | priority | state
group_by = "none"

[search]
# When true, `/` can search across all projects.
cross_project = false
include_archived = false
# Canonical lifecycle states only: todo | progress | done | archived.
states = ["todo", "progress", "done"]

[embeddings]
# Enable semantic/hybrid search indexing and retrieval.
enabled = false
# Current provider support: ollama | openai | deterministic
# The default local operator path is Ollama's OpenAI-compatible embeddings API.
# The fantasy adapter also supports hosted OpenAI-compatible providers.
# For TogetherAI, OpenRouter, or similar endpoints, use provider = "openai"
# with base_url pointed at the provider endpoint and api_key_env set accordingly.
# The deterministic provider is intended for tests and fixtures, not production retrieval quality.
provider = "ollama"
model = "qwen3-embedding:8b"
# API key environment variable read at startup when embeddings.provider = "openai".
# Ollama does not require a real API key; leave this blank unless your proxy expects one.
api_key_env = ""
# Optional provider endpoint override.
# Ollama's qwen3-embedding:8b endpoint typically lives at http://127.0.0.1:11434/v1.
# OpenAI-compatible hosted providers should set base_url to their compatible API root.
base_url = "http://127.0.0.1:11434/v1"
# Optional embedding dimensions override (0 uses the provider default).
# The deterministic provider defaults to 256 dimensions.
dimensions = 0
# Candidate window size for semantic retrieval before app-level filtering/ranking.
query_top_k = 200
# Hybrid rank weights (normalized at runtime).
lexical_weight = 0.55
semantic_weight = 0.45
# Background worker poll interval for queued indexing work.
worker_poll_interval = "2s"
# How long one running claim may go without heartbeat before recovery treats it as abandoned.
claim_ttl = "2m"
# Maximum attempts before a row stays failed until another enqueue or explicit reindex.
max_attempts = 5
# Retry backoff window for retryable failures.
initial_retry_backoff = "15s"
max_retry_backoff = "15m"

[identity]
# Immutable runtime identity token; auto-generated on first TUI startup if empty.
actor_id = ""
# Display name used for default actor identity in prompts and logs.
display_name = ""
# user | agent | system
default_actor_type = "user"

[paths]
# Global filesystem roots used for search/picker defaults.
search_roots = []

[ui]
# Durations used for "due soon" badges and summary counts.
due_soon_windows = ["24h", "1h"]
show_due_summary = true

[logging]
# debug | info | warn | error | fatal
level = "info"

[logging.dev_file]
# When true in --dev mode, runtime logs are also written to a local file sink.
enabled = true
# The default sentinel resolves to the shared runtime root logs directory.
# Explicit relative overrides are resolved from the current workspace directory.
dir = ".tillsyn/log"

[project_roots]
# Machine-local root mappings by project slug. Keep these in TOML so DB exports stay portable.
# Example:
# inbox = "/Users/you/dev/inbox-repo"

[labels]
# Suggested labels available across all projects.
global = ["planning", "bug", "chore"]
# When true, task labels must come from global + project-specific allowlists.
enforce_allowed = false

[labels.projects]
# Per-project suggested labels, keyed by project slug.
inbox = ["till", "roadmap", "ux"]

[keys]
command_palette = ":"
quick_actions = "."
multi_select = "space"
activity_log = "g"
undo = "z"
redo = "Z"
