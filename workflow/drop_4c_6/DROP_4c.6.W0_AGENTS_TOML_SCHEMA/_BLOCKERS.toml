node = "4c.6.W0.D2"
blocked_by = ["4c.6.W0.D1"]
reason = "D2 consumes D1's Preset / Override / AgentRuntime / Kind types AND edits the same agents.go file AND shares the internal/config package compile/test unit"

[[blockers]]
