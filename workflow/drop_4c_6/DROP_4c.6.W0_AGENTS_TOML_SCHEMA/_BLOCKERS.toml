blocked_by = ["4c.6.W0.D2"]
reason = "D3 reuses D2's mergeMaps helper for env-map per-key merge AND shares the internal/config package compile/test unit; D3's tests verify resolved registry via D2's Resolve"

[[blockers]]
node = "4c.6.W0.D4"
blocked_by = ["4c.6.W0.D3"]
reason = "same-package serial chain — internal/config shares one compile unit; frontmatter.go is file-disjoint from agents.go but the package lock binds"

[[blockers]]
node = "4c.6.W0.D5"
