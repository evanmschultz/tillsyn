# _BLOCKERS.toml — workflow/drop_4c_6/DROP_4c.6.W0_AGENTS_TOML_SCHEMA/
# Immediate-children sibling blocker ledger for Wave W0 (agents.toml schema layer).
# Mirrors inline `Blocked by:` bullets in PLAN.md; PLAN.md is truth.
#
# All five droplets share the `internal/config` Go package. Per
# `~/.claude/agents/go-planning-agent.md` § "Cascade Design — Atomic Droplets +
# Parallelization (HARD RULES)": "Siblings sharing a `packages` entry (even
# with disjoint paths within that package) → `blocked_by`. Go-package
# compilation is shared." The chain is therefore strict serial:
#
#   W0.D1 → W0.D2 → W0.D3 → W0.D4 → W0.D5
#
# D1 has no blockers (W0 sub-plan itself has Blocked by: — at the L1 layer).

