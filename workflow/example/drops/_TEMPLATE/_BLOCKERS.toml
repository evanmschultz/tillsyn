# _BLOCKERS.toml — DROP_N_<NAME>/
# Sibling blocked_by ledger for this dir's immediate children.
# Present only when this dir has >1 immediate child (sub-drop or droplet).
# Mirrors inline `Blocked by:` bullets in PLAN.md; PLAN.md is truth.
#
# This file is template-stamped into every new drop dir by Phase 1 step 1
# (orch copies drops/_TEMPLATE/). The planner decides droplet count in
# Phase 1 step 3, then orch runs Phase 1 step 4: commit the plan AND
# `git rm _BLOCKERS.toml` in the same commit IF the planner emitted ≤1
# immediate child (see drops/WORKFLOW.md Phase 1 step 4). Multi-child
# dirs: orch leaves this scaffold in place; the planner populates the
# [[blockers]] entries below (either inline during Phase 1 or during
# the Phase 3 revise loop).
#
# Planner never commits or runs `git rm` — orch owns the commit/delete
# action per WORKFLOW.md Phase 1 step 4.
#
# Today: coordination hint. Human/LLM-enforced.
# Post-coordination-runtime (tillsyn-native flavor): Tillsyn Drop 1
# promotes `paths` / `packages` to first-class ActionItem fields.
# Tillsyn Drop 4 ships the dispatcher that hard-refuses in_progress
# transitions while any blocked_by entry remains unresolved —
# prevents work starting on items whose blockers haven't cleared.
# This file becomes the migration source at that point (each
# [[blockers]] row loads into ActionItem.blocked_by). Migration is
# two-step: regenerate from PLAN.md first (sync), then load into
# runtime. Never import directly — stale TOML = regression at
# enforcement turn-on.
#
# Scope: immediate children of this dir ONLY. Cross-level blockers
# ride on the parent-close-waits-for-child rule, not on this file.
# Cross-subtree leaf-level ordering is NOT expressible; escalate to
# the nearest-common-ancestor-immediate-children pair or refactor
# package boundaries.

# [[blockers]]
# node = "N.3"
# blocked_by = ["N.1", "N.2"]
# reason = "short explanation of the ordering constraint"
