# Default-template context seed for the build binding (F.7.18.5; SKETCH:195-199).
# Builder lens — `parent_git_diff = true` reduces redundant tool calls during
# implementation by pre-staging the diff between the parent's start_commit and
# end_commit (Drop 4a Wave 1 first-class fields on domain.ActionItem).
