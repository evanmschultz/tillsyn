# Tillsyn default cascade template (builtin).
#
# Authoritative source for the closed 12-kind catalog, agent bindings, and
# auto-create [child_rules] consumed by the cascade dispatcher.
#
# Loaded via internal/templates.LoadDefaultTemplate (embed.FS at
# internal/templates/embed.go). Projects ship without an explicit
# <project_root>/.tillsyn/template.toml fall back to this default at
# project-creation bake time (KindCatalog.Bake — internal/templates/catalog.go).
#
# Canonical specs:
#   - main/PLAN.md § 19.3 (template-overhaul scope, line 1623+).
#   - main/CLAUDE.md "Agent Bindings" table (kind → agent name + model + role).
#   - workflow/drop_3/PLAN.md droplet 3.14 (this file's acceptance contract).
#
# Encoding rules:
#   - schema_version is pinned to "v1"; bumping it requires a migration gate
#     in internal/templates/load.go (see SchemaVersionV1 constant).
#   - Reverse-hierarchy prohibitions (PLAN.md § 19.3 finding 5.B.16 N3) are
#     EXPLICIT via [kinds.<parent>].allowed_child_kinds enumerating every
#     allowed child EXCEPT the prohibited one. Adding a 13th kind in a
#     future drop is therefore an explicit opt-in, not an implicit allow.
#   - Auto-create rules (PLAN.md § 19.3 line 1635) are encoded as
#     [[child_rules]] entries; the auto-generator (Drop 3 droplet 3.20)
#     materializes one ActionItem per rule when the parent is created.
#   - STEWARD persistent parent seeds (PLAN.md § 15.7 + § 19.3 line 1637)
#     are encoded as [[steward_seeds]] entries below; the auto-generator
#     (droplet 3.20) materializes one ActionItem per seed at project-
#     creation time with Owner = "STEWARD", Persistent = true, Kind =
#     "discussion", StructuralType = "droplet". This is option (a) from
#     droplet 3.14's deferred comment — a separate top-level table with
#     its own loader path keeps the closed-enum ChildRule.WhenParentKind
#     invariant intact while making "fires at project creation" semantics
#     explicit.

schema_version = "v1"

# -----------------------------------------------------------------------------
# [kinds] — closed 12-value Kind enum.
# -----------------------------------------------------------------------------
#
# Each row records:
#   - owner: principal responsible for materializing children (per fix L7;
#     "STEWARD" marks STEWARD-owned, the auth gate at internal/adapters/
#     server/common/app_service_adapter_mcp.go reads this).
#   - allowed_parent_kinds: kinds that may parent this kind. Empty =
#     universal-allow.
#   - allowed_child_kinds: kinds that may be children of this kind. Empty =
#     universal-allow. The four reverse-hierarchy prohibitions documented in
#     PLAN.md § 19.3 are encoded by enumerating every kind EXCEPT the
#     prohibited child here, mirroring the hand-coded fixture in
#     internal/templates/nesting_test.go (3.10).
#   - structural_type: cascade-shape classification per PLAN.md § 19.3 line
#     1635. drop / segment / confluence / droplet — orthogonal to kind.

[kinds.plan]
# Planning-dominant — planner agent decomposes work into children. Plans
# nest infinitely; a plan may contain sub-plans, builds, research,
# discussions, etc.
structural_type = "droplet"

[kinds.research]
# Read-only investigation — research agent compiles findings, posts a
# comment, dies. Does NOT auto-create QA children.
structural_type = "droplet"

[kinds.build]
# Code-changing leaf — builder agent implements, tests, commits.
# Auto-creates build-qa-proof + build-qa-falsification children via
# [[child_rules]] below.
structural_type = "droplet"

[kinds.plan-qa-proof]
# Proof-completeness QA pass on a plan parent.
structural_type = "droplet"

[kinds.plan-qa-falsification]
# Falsification QA pass on a plan parent.
structural_type = "droplet"

[kinds.build-qa-proof]
# Proof-completeness QA pass on a build parent. Reverse-hierarchy
# prohibition (PLAN.md § 19.3): build-qa-proof cannot parent a plan.
# allowed_child_kinds enumerates every kind EXCEPT plan.
allowed_child_kinds = [
    "research",
    "build",
    "plan-qa-proof",
    "plan-qa-falsification",
    "build-qa-proof",
    "build-qa-falsification",
    "closeout",
    "commit",
    "refinement",
    "discussion",
    "human-verify",
]
structural_type = "droplet"

[kinds.build-qa-falsification]
# Falsification QA pass on a build parent. Reverse-hierarchy prohibition
# (PLAN.md § 19.3): build-qa-falsification cannot parent a plan.
allowed_child_kinds = [
    "research",
    "build",
    "plan-qa-proof",
    "plan-qa-falsification",
    "build-qa-proof",
    "build-qa-falsification",
    "closeout",
    "commit",
    "refinement",
    "discussion",
    "human-verify",
]
structural_type = "droplet"

[kinds.closeout]
# Drop-end coordination — aggregates ledger / refinements / findings.
# STEWARD-owned per PLAN.md § 15.7 (§ 19.3 bullet 9). Reverse-hierarchy
# prohibition: closeout cannot parent another closeout. allowed_child_kinds
# enumerates every kind EXCEPT closeout.
owner = "STEWARD"
allowed_child_kinds = [
    "plan",
    "research",
    "build",
    "plan-qa-proof",
    "plan-qa-falsification",
    "build-qa-proof",
    "build-qa-falsification",
    "commit",
    "refinement",
    "discussion",
    "human-verify",
]
structural_type = "droplet"

[kinds.commit]
# Commit action — template-triggered under plan at level >= 2 (Commit
# Cadence rule, CLAUDE.md). Reverse-hierarchy prohibition: commit cannot
# parent a plan. allowed_child_kinds enumerates every kind EXCEPT plan.
allowed_child_kinds = [
    "research",
    "build",
    "plan-qa-proof",
    "plan-qa-falsification",
    "build-qa-proof",
    "build-qa-falsification",
    "closeout",
    "commit",
    "refinement",
    "discussion",
    "human-verify",
]
structural_type = "droplet"

[kinds.refinement]
# Perpetual / long-lived tracking umbrella — drop-end entries roll up
# here. STEWARD-owned per PLAN.md § 15.7.
owner = "STEWARD"
structural_type = "droplet"

[kinds.discussion]
# Cross-cutting decision park — description = converged shape, comments =
# audit trail.
structural_type = "droplet"

[kinds.human-verify]
# Dev sign-off hold point — attention items + checklist children, no
# plan/QA. Reverse-hierarchy prohibition: human-verify cannot parent a
# build. allowed_child_kinds enumerates every kind EXCEPT build.
allowed_child_kinds = [
    "plan",
    "research",
    "plan-qa-proof",
    "plan-qa-falsification",
    "build-qa-proof",
    "build-qa-falsification",
    "closeout",
    "commit",
    "refinement",
    "discussion",
    "human-verify",
]
structural_type = "droplet"

# -----------------------------------------------------------------------------
# [[child_rules]] — auto-create directives evaluated at parent creation time.
# -----------------------------------------------------------------------------
#
# Per PLAN.md § 19.3 line 1635:
#   - build → build-qa-proof + build-qa-falsification
#   - plan  → plan-qa-proof  + plan-qa-falsification
#   - structural_type=drop → planner droplet + qa-proof droplet +
#                            qa-falsification droplet (a kind=plan with
#                            its own QA twins).
#
# WhenParentStructuralType narrows the rule when set; an empty value
# matches every parent structural_type. blocked_by_parent wires the
# auto-created child with a blocked_by edge to the parent so the child
# cannot start until the parent reaches its terminal completion state.

# build → build-qa-proof
[[child_rules]]
when_parent_kind = "build"
create_child_kind = "build-qa-proof"
title = "BUILD-QA-PROOF"
blocked_by_parent = true

# build → build-qa-falsification
[[child_rules]]
when_parent_kind = "build"
create_child_kind = "build-qa-falsification"
title = "BUILD-QA-FALSIFICATION"
blocked_by_parent = true

# plan → plan-qa-proof
[[child_rules]]
when_parent_kind = "plan"
create_child_kind = "plan-qa-proof"
title = "PLAN-QA-PROOF"
blocked_by_parent = true

# plan → plan-qa-falsification
[[child_rules]]
when_parent_kind = "plan"
create_child_kind = "plan-qa-falsification"
title = "PLAN-QA-FALSIFICATION"
blocked_by_parent = true

# structural_type=drop planner droplet — DEFERRED.
#
# PLAN.md § 19.3 line 1635 names three children for a drop-structural
# parent: "a planner droplet + qa-proof droplet + qa-falsification droplet."
# The planner-droplet is itself kind=plan, which produces a parent->child
# edge of plan->plan in the cycle-detection graph at internal/templates/
# load.go:validateChildRuleCycles. The validator (committed in droplet
# 3.9) does NOT model the structural_type narrowing, so a plan->plan rule
# even when filtered by when_parent_structural_type still trips the
# self-loop cycle check.
#
# Resolution: the QA-twins-for-drop pair below covers two of the three
# children the spec names. The drop-planner droplet remains drop-orch
# created manually (consistent with pre-cascade behavior). Droplet 3.20
# may revisit either by relaxing the cycle validator to ignore self-loops
# narrowed by structural_type, or by introducing a distinct kind for the
# drop-planner role. For now, omitting the drop-planner rule is the
# correct trade against breaking the load-time cycle invariant.

# structural_type=drop -> plan-qa-proof (drop-level plan QA twin).
[[child_rules]]
when_parent_kind = "plan"
when_parent_structural_type = "drop"
create_child_kind = "plan-qa-proof"
title = "DROP-PLAN-QA-PROOF"
blocked_by_parent = true

# structural_type=drop -> plan-qa-falsification (drop-level plan QA twin).
[[child_rules]]
when_parent_kind = "plan"
when_parent_structural_type = "drop"
create_child_kind = "plan-qa-falsification"
title = "DROP-PLAN-QA-FALSIFICATION"
blocked_by_parent = true

# -----------------------------------------------------------------------------
# [[steward_seeds]] — long-lived coordination anchors seeded at project creation.
# -----------------------------------------------------------------------------
#
# Per fix L3 + droplet 3.20 (this file's auto-generation consumer): six
# STEWARD-owned level_1 persistent parents are spawned once on project
# creation by Service.CreateProjectWithMetadata. Each seed materializes as
# an ActionItem with:
#
#   - Owner          = "STEWARD"
#   - Persistent     = true        (per fix L9 — anchor nodes survive across drops)
#   - DevGated       = false       (anchors do not gate dev sign-off themselves)
#   - Kind           = "discussion" (cross-cutting, no auto-QA twins)
#   - StructuralType = "droplet"   (terminal anchor, not cascade work; the
#                                   closest fit since domain.NewActionItem
#                                   rejects an empty StructuralType)
#   - DropNumber     = 0           (anchors are not numbered drops)
#
# Encoding choice: option (a) from droplet 3.14's deferred comment — a
# separate [[steward_seeds]] table with its own loader path. This keeps the
# closed-enum ChildRule.WhenParentKind invariant intact (every [[child_rules]]
# entry still triggers on a real Kind), while making "fires at project
# creation" semantics explicit on a distinct top-level table rather than
# overloading ChildRule with a sentinel parent kind or a new
# AtProjectCreation bool. The auto-generator iterates StewardSeeds in
# declaration order; idempotency keys on (project_id, owner, title) so
# re-running the project-creation hook does not duplicate rows.

[[steward_seeds]]
title = "DISCUSSIONS"
description = "Cross-cutting discussion topics. Description = converged shape, comments = audit trail of dev quotes."

[[steward_seeds]]
title = "HYLLA_FINDINGS"
description = "Per-drop Hylla feedback aggregated by drop-orch + STEWARD."

[[steward_seeds]]
title = "LEDGER"
description = "Per-drop ledger entries — cost, node count, refactors, descriptions. Populated post-merge by STEWARD from each drop's DROP_N_LEDGER_ENTRY level_2 finding."

[[steward_seeds]]
title = "WIKI_CHANGELOG"
description = "Per-drop wiki changelog entries — what shifted in WIKI.md and why. Populated post-merge by STEWARD."

[[steward_seeds]]
title = "REFINEMENTS"
description = "Perpetual refinement rollup — entries raised during drop work that did not block the drop. Populated drop-end by drop-orch via DROP_N_REFINEMENTS_RAISED."

[[steward_seeds]]
title = "HYLLA_REFINEMENTS"
description = "Perpetual Hylla-tooling refinement rollup — entries that came out of Hylla-feedback rounds. Populated drop-end by drop-orch via DROP_N_HYLLA_REFINEMENTS_RAISED."

# -----------------------------------------------------------------------------
# [gates] — per-kind closed-enum gate sequence (Drop 4b Wave A 4b.1).
# -----------------------------------------------------------------------------
#
# Each [gates.<kind>] entry pairs a parent action-item kind with the ordered
# list of GateKind values the dispatcher's gate runner (Drop 4b Wave A 4b.2)
# executes when an action item of that kind transitions to its provisional
# terminal state. Halt-on-first-failure: the first gate that returns
# Success: false halts the sequence and the action item moves to `failed`
# with metadata.BlockedReason populated.
#
# Closed-enum gate vocabulary (templates.GateKind):
#   - mage_ci          — `mage ci` in project's primary worktree (4b.3).
#   - mage_test_pkg    — `mage testPkg <pkg>` per item.Packages (4b.4).
#   - hylla_reingest   — drop-end Hylla reingest (4b.7).
#
# Drop 4c expands the enum with "commit" and "push" and the build sequence
# becomes ["mage_ci", "commit", "push"]. Drop 4b Wave A ships only mage_ci
# in the build sequence per REVISION_BRIEF locked decision L6 — the closed
# enum stays tight and the default template stays minimal until Drop 4c
# lands the additional gate implementations.
#
# Absence of an entry for a given kind means "no gates" — the gate runner
# returns Success: true immediately. NOT "all gates" (resolves WAVE_A_PLAN
# 4b.1 acceptance bullet).
#
# Distinct from the reserved [gate_rules] table on Template.GateRulesRaw —
# the two TOML keys (`gates` vs `gate_rules`) decode independently. A future
# drop may type GateRulesRaw into a richer per-gate config struct (timeouts,
# retry policy) without colliding with `gates`.

[gates]
build = ["mage_ci"]

# -----------------------------------------------------------------------------
# [agent_bindings] — closed 12-value Kind → agent spawn parameters.
# -----------------------------------------------------------------------------
#
# Mapping per main/CLAUDE.md "Agent Bindings" table.
#
# model = "opus" for builders + QA + planning + research per pre-MVP rule
# (memory feedback_opus_builders_pre_mvp.md — "no optimization before
# measurement; run opus until cascade dogfooding begins"). The commit
# kind binds the haiku-driven commit-message-agent per CLAUDE.md.
#
# Coordination kinds (closeout, refinement, discussion, human-verify) are
# orchestrator-managed today (CLAUDE.md "Agent Bindings" table) — they do
# not spawn an automated agent. Pre-cascade these are worked by the
# parent orchestrator session manually. Their bindings here record a
# placeholder agent name + model so the dispatcher (Drop 4) has a row to
# look up; the actual spawn behavior for those kinds remains
# orchestrator-driven until later drops define dedicated agents for them.
#
# tools = [] is the placeholder — the actual MCP tool allow-list lands
# in Drop 4 per finding 5.B.5. AgentBinding.Validate (schema.go) does
# not constrain Tools content beyond Drop 4's gating, so an empty list
# decodes cleanly.

[agent_bindings.plan]
agent_name = "go-planning-agent"
model = "opus"
effort = "medium"
tools = []
max_tries = 3
max_budget_usd = 5.0
max_turns = 50
auto_push = false
commit_agent = "commit-message-agent"
blocked_retries = 0
blocked_retry_cooldown = "30s"

# Default-template context seed for the plan binding (F.7.18.5; SKETCH:195-199).
# Planners walk UP the parent chain only — `ancestors_by_kind = ["plan"]` lets
# a sub-plan see its enclosing plan parent. NO `descendants_by_kind` in the
# default seed — fix-planners + tree-pruners are an adopter opt-in (the
# schema per F.7.18.1 accepts the field; the default just doesn't seed it).
#
# FLEXIBLE-not-REQUIRED framing per master PLAN.md L13: adopters who fork
# this template MAY remove this `[context]` block for fully-agentic plan
# spawns. Both modes are first-class.
[agent_bindings.plan.context]
parent = true
ancestors_by_kind = ["plan"]
delivery = "file"
max_chars = 50000
max_rule_duration = "500ms"

[agent_bindings.research]
