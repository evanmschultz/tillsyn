# agents.example.toml — Tillsyn runtime-config example (Drop 4c.6.1 W4.D2 schema).
#
# Copied to <project>/agents.toml by `till init` (Drop 4c.6 W2). Adopters
# customize per project; an optional gitignored agents.local.toml deep-merges
# OVER this file at spawn time per SKETCH.md § 4.3 / § 5.
#
# Schema source-of-truth: REVISION_BRIEF.md § 2.12 — multi-group
# [<group>] defaults block + [<group>.<kind>] per-kind override blocks.
# Drop 4c.6.1 W0 lands the Go decoder for this schema in
# internal/config/agents.go (AgentsRegistry).
#
# Shape: [<group>] for group-level defaults; [<group>.<kind>] for per-kind
# overrides within a group. Per-kind blocks override only the fields they
# care about; absent fields fall through to the group defaults via
# field-level inheritance per SKETCH.md § 4.2.1.
#
# The three canonical group names shipped in Drop 4c.6.1 W4.D1:
#   - go  — Go + mage projects (uses till-go.toml agent bindings)
#   - gen — language-agnostic generic (uses till-gen.toml agent bindings)
#   - fe  — front-end / Wails projects (uses till-fe.toml agent bindings)
#
# This fixture is loader-validated by Drop 4c.6.1 W0 once W0 lands; W1.D1
# shipped the file but did NOT exercise the loader (chicken/egg avoided per
# the droplet RiskNotes). W4.D2 migrates to the new schema.

# -----------------------------------------------------------------------------
# [go] — Go group defaults.
# -----------------------------------------------------------------------------
#
# Every cascade kind in the go group inherits from this block. Per-kind
# [go.<kind>] blocks below override only the fields they care about; absent
# fields fall through to these defaults via field-level inheritance per
# SKETCH.md § 4.2.1.

[go]
client = "claude"
model = "claude-sonnet-4-6"
effort = "medium"
max_tries = 3
max_budget_usd = 5.0
max_turns = 50
blocked_retries = 0
blocked_retry_cooldown = "30s"
auto_push = false
env_set = {}
env_from_shell = { ANTHROPIC_API_KEY = "ANTHROPIC_API_KEY" }
cli_args = []
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP"]
tools_deny = []
claude_md_addons = []

# -----------------------------------------------------------------------------
# Per-kind overrides within the go group.
# Planner + builder run sonnet (inherited from [go]); QA pair runs opus;
# commit-message-agent runs haiku.
# -----------------------------------------------------------------------------

[go.plan]
# Planner inherits model = sonnet from [go]. Bigger budget + turn cap
# because decomposition + plan-down work consumes more tokens than typical
# cascade work.
max_budget_usd = 8.0
max_turns = 80
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__plugin_context7_context7__resolve-library-id", "mcp__plugin_context7_context7__query-docs", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

[go.build]
# Builder inherits model = sonnet from [go]. Adds Edit + Write to the
# tool surface — builder is the only role that mutates code.
tools_allow = ["Read", "Edit", "Write", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

# QA agents run on opus — deeper falsification + proof reasoning warrants the
# bigger model. NO Edit / Write — QA is read-only by structural rule.
[go.plan-qa-proof]
model = "claude-opus-4-7"
max_budget_usd = 4.0
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

[go.plan-qa-falsification]
model = "claude-opus-4-7"
max_budget_usd = 4.0
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

[go.build-qa-proof]
model = "claude-opus-4-7"
max_budget_usd = 3.0
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

[go.build-qa-falsification]
model = "claude-opus-4-7"
max_budget_usd = 3.0
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

[go.research]
# Research inherits model = sonnet from [go]. Smaller budget — research
# is read-only investigation that should fit in a single comment.
max_budget_usd = 3.0

[go.commit]
# Commit-message-agent runs haiku — cheap+fast commit message generation.
# Tools are minimal: Read for diff context, Bash for `git diff` / `git log`.
model = "claude-haiku-4-5-20251001"
max_budget_usd = 0.10
max_turns = 5
tools_allow = ["Read", "Bash"]

# -----------------------------------------------------------------------------
# [gen] — language-agnostic generic group defaults.
# -----------------------------------------------------------------------------
#
# Drop 4d_codex Phase 1: multi-backend routing example.
#
# Routing thesis: route deep-reasoning kinds (plan / QA-falsification /
# research) to codex; keep specialist evidence-verification (QA-proof) on
# claude opus; route atomic leaf work (build / commit) to claude haiku.
#
# client = "claude" is the group-level default; per-kind blocks below set
# client = "codex" only where the codex backend is preferred.
#
# Codex models pinned to `gpt-5.5` (top reasoning tier) below; effort is
# tiered per role via `effort = "medium" | "high" | "xhigh"`. The single-model
# + tiered-effort thesis lets one ChatGPT-tier entitlement cover plan + qa-
# falsification + research with reasoning-budget controlling cost. Adopters
# on a different tier can swap to `gpt-5.4` (mid) or `gpt-5.4-mini` (cheap
# subagent tier) per OpenAI's Codex model catalog.
#
# ChatGPT-account auth: codex CLI manages OAuth tokens itself under
# `~/.codex/` — NO `OPENAI_API_KEY` env var is required for ChatGPT-tier
# spawns. API-key-tier adopters add `env_from_shell = { OPENAI_API_KEY =
# "OPENAI_API_KEY" }` to each codex block.
#
# Mirrors the go group structure. Till-gen.toml bindings omit [agent_bindings]
# by design; adopters declare bindings in their project-local template.toml.
# The gen group is the safe default for non-Go projects until a dedicated
# group ships.

[gen]
client = "claude"
model = "claude-sonnet-4-6"
effort = "medium"
max_tries = 3
max_budget_usd = 5.0
max_turns = 50
blocked_retries = 0
blocked_retry_cooldown = "30s"
auto_push = false
env_set = {}
env_from_shell = { ANTHROPIC_API_KEY = "ANTHROPIC_API_KEY" }
cli_args = []
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP"]
tools_deny = []
claude_md_addons = []

# plan — deep decomposition reasoning. Routes to codex (cheap deep reasoning).
[gen.plan]
client = "codex"
model = "gpt-5.5"
effort = "medium"
max_budget_usd = 8.0
max_turns = 80
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__plugin_context7_context7__resolve-library-id", "mcp__plugin_context7_context7__query-docs", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

# plan-qa-proof — evidence verification specialist. Stays on claude opus.
# Proof is pattern-matching + citation; opus is the strongest verifier here.
[gen.plan-qa-proof]
client = "claude"
model = "claude-opus-4-7"
max_budget_usd = 4.0
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

# plan-qa-falsification — adversarial reasoning. Routes to codex at max effort.
# Falsification benefits from the deepest available reasoning budget.
[gen.plan-qa-falsification]
client = "codex"
model = "gpt-5.5"
effort = "xhigh"
max_budget_usd = 4.0
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

# research — read-only investigation. Routes to codex (cheap, thorough).
[gen.research]
client = "codex"
model = "gpt-5.5"
effort = "high"
max_budget_usd = 3.0

# build — atomic leaf work via ≤4-block planner prompt. Routes to claude haiku.
# Haiku is fast + cheap for well-scoped atomic droplets.
[gen.build]
client = "claude"
model = "claude-haiku-4-5-20251001"
tools_allow = ["Read", "Edit", "Write", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

# build-qa-proof — evidence verification. Stays on claude opus.
[gen.build-qa-proof]
client = "claude"
model = "claude-opus-4-7"
max_budget_usd = 3.0
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

# build-qa-falsification — adversarial reasoning. Routes to codex at max effort.
[gen.build-qa-falsification]
client = "codex"
model = "gpt-5.5"
effort = "xhigh"
max_budget_usd = 3.0
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

# commit — single-line conventional commit message. Routes to claude haiku.
# Cheap + fast; commit message generation is a narrow, well-scoped task.
[gen.commit]
client = "claude"
model = "claude-haiku-4-5-20251001"
max_budget_usd = 0.10
max_turns = 5
tools_allow = ["Read", "Bash"]

# -----------------------------------------------------------------------------
# [fe] — front-end / Wails group defaults (Drop 4c.6.1 W4.D1 + W4.D2).
# -----------------------------------------------------------------------------
#
# FE projects use Wails + Astro + SolidJS. The fe group adds Playwright MCP
# tools for visual + interaction QA. Til-fe.toml ships the agent bindings for
# this group (planning-agent, builder-agent, plan-qa-proof-agent, etc.).

[fe]
client = "claude"
model = "claude-sonnet-4-6"
effort = "medium"
max_tries = 3
max_budget_usd = 5.0
max_turns = 50
blocked_retries = 0
blocked_retry_cooldown = "30s"
auto_push = false
env_set = {}
env_from_shell = { ANTHROPIC_API_KEY = "ANTHROPIC_API_KEY" }
cli_args = []
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP"]
tools_deny = []
claude_md_addons = []

[fe.plan]
max_budget_usd = 8.0
max_turns = 80
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__plugin_context7_context7__resolve-library-id", "mcp__plugin_context7_context7__query-docs", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

[fe.build]
# FE builder also needs Write for TypeScript / Astro / CSS file creation.
tools_allow = ["Read", "Edit", "Write", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

[fe.plan-qa-proof]
model = "claude-opus-4-7"
max_budget_usd = 4.0
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

[fe.plan-qa-falsification]
model = "claude-opus-4-7"
max_budget_usd = 4.0
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

[fe.build-qa-proof]
model = "claude-opus-4-7"
max_budget_usd = 3.0
# FE QA proof adds Playwright MCP for visual + interaction verification.
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment", "mcp__plugin_playwright_playwright__*"]

[fe.build-qa-falsification]
model = "claude-opus-4-7"
max_budget_usd = 3.0
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment", "mcp__plugin_playwright_playwright__*"]

[fe.research]
max_budget_usd = 3.0

[fe.commit]
model = "claude-haiku-4-5-20251001"
max_budget_usd = 0.10
max_turns = 5
tools_allow = ["Read", "Bash"]
