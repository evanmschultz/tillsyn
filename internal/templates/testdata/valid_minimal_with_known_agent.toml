# valid_minimal_with_known_agent — happy-path fixture for validateAgentBindingNames
# (W0.5.D2).
#
# Structurally identical to valid_minimal.toml; the [agent_bindings.build]
# block declares agent_name = "builder-agent" which the test injects a
# synthetic LoadOptions.AgentLookupFn for (returns true for "builder-agent").
# Loader MUST pass cleanly. The fixture's value is exercising the
# happy-path row of the W0.5.D2 table — confirming the validator does not
# false-fire when the resolver hits at the embedded floor.

schema_version = "v1"

[kinds.build]
owner = "STEWARD"
allowed_parent_kinds = ["plan"]
allowed_child_kinds = ["build-qa-proof", "build-qa-falsification"]
structural_type = "droplet"

[[child_rules]]
when_parent_kind = "build"
create_child_kind = "build-qa-proof"
title = "BUILD-QA-PROOF"
blocked_by_parent = true

[[child_rules]]
when_parent_kind = "build"
create_child_kind = "build-qa-falsification"
title = "BUILD-QA-FALSIFICATION"
blocked_by_parent = true

[agent_bindings.build]
agent_name = "builder-agent"
model = "opus"
