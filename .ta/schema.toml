[contributing]
description = 'Contribution rules. Sections addressable.'
paths = ['CONTRIBUTING.md']

[contributing.section]
description = 'An H2 section of CONTRIBUTING.md.'
heading = 2

[contributing.section.fields]
[contributing.section.fields.body]
format = 'markdown'
type = 'string'

[discussions]
description = 'Open discussions. Lifecycle: todo (open) → complete (closed via promotion or rejection).'
paths = ['.ta/cascade/discussions.toml']

[discussions.discussion]
description = 'An open discussion item. May graduate to plan or drop, or be closed without action.'
extends = 'ActionItem'

[discussions.discussion.fields]
[discussions.discussion.fields.structural_type]
default = ''
enum = ['']
type = 'string'

[plans]
description = 'Overarching plans pre-drop. Lifecycle: todo → in_progress → complete (outcome=success when promoted to drop, outcome=failure when rejected).'
paths = ['.ta/cascade/plans.toml']

[plans.plan]
description = 'An overarching plan. Eventually decomposed into a drop tree.'
extends = 'ActionItem'

[plans.plan.fields]
[plans.plan.fields.structural_type]
default = ''
enum = ['']
type = 'string'

[project]
description = 'Project node — onboarding metadata for orchestrator agents and humans.'
paths = ['.ta/cascade/project.toml']

[project.bases]
[project.bases.ActionItem]
description = 'An action item — a node carrying work. Adds role, structural classification, edit-scope fields, completion contract.'
extends = 'NodeBase'

[project.bases.ActionItem.fields]
[project.bases.ActionItem.fields.acceptance_criteria]
description = "Behavior-level assertions — how we know it's done."
format = 'markdown'
type = 'string'

[project.bases.ActionItem.fields.attempt_count]
default = 0
description = 'Number of times this item entered in_progress.'
type = 'integer'

[project.bases.ActionItem.fields.blocked_reason]
description = 'Free prose explaining why item is blocked.'
format = 'markdown'
type = 'string'

[project.bases.ActionItem.fields.blocked_retry_count]
default = 0
description = 'Number of times this item transitioned in_progress→failed→in_progress.'
type = 'integer'

[project.bases.ActionItem.fields.canceled_at]
type = 'datetime'

[project.bases.ActionItem.fields.command_snippets]
description = 'Shell commands relevant to the item — copy-pasteable.'
element_type = 'string'
type = 'array'

[project.bases.ActionItem.fields.completion_contract]
description = 'Structured contract describing how the item enters and exits.'
type = 'table'

[project.bases.ActionItem.fields.completion_contract.fields]
[project.bases.ActionItem.fields.completion_contract.fields.completion_checklist]
description = "Concrete operator-facing checklist tracked across the item's lifecycle."
element_type = 'ChecklistItem'
type = 'array'

[project.bases.ActionItem.fields.completion_contract.fields.completion_criteria]
description = 'Checklist of behavior-level assertions that mark the item complete.'
element_type = 'ChecklistItem'
type = 'array'

[project.bases.ActionItem.fields.completion_contract.fields.completion_evidence]
description = 'References (ta record ids, URLs, file paths) demonstrating completion.'
element_type = 'string'
type = 'array'

[project.bases.ActionItem.fields.completion_contract.fields.completion_notes]
description = 'Free prose summarizing the completion outcome.'
format = 'markdown'
type = 'string'

[project.bases.ActionItem.fields.completion_contract.fields.require_children_complete]
default = true
description = 'Whether all child action items must reach state=complete before this item can transition to complete.'
type = 'boolean'

[project.bases.ActionItem.fields.completion_contract.fields.start_criteria]
description = 'Checklist of preconditions that must hold before the item can transition todo→in_progress.'
element_type = 'ChecklistItem'
type = 'array'

[project.bases.ActionItem.fields.context_blocks]
description = 'Context attachments — code locations, URLs, doc refs the agent needs to do the work or verify it.'
element_type = 'ContextBlock'
type = 'array'

[project.bases.ActionItem.fields.decision_log]
description = 'Append-only decision entries. Each is a short markdown blurb.'
element_type = 'string'
type = 'array'

[project.bases.ActionItem.fields.definition_of_complete]
description = "Concrete checklist of what 'complete' means for this item."
format = 'markdown'
type = 'string'

[project.bases.ActionItem.fields.dev_gated]
default = false
description = 'True if state transitions require human reviewer approval.'
type = 'boolean'

[project.bases.ActionItem.fields.due_at]
description = 'Optional deadline.'
type = 'datetime'

[project.bases.ActionItem.fields.end_commit]
description = 'Commit hash at which terminal state was reached.'
type = 'string'

[project.bases.ActionItem.fields.expected_outputs]
description = 'Files / artifacts the item is expected to produce.'
element_type = 'string'
type = 'array'

[project.bases.ActionItem.fields.files]
description = 'Reference attachments — files the agent should read for context but not write.'
element_type = 'string'
type = 'array'

[project.bases.ActionItem.fields.implementation_notes_agent]
description = 'Agent-authored notes captured during work.'
format = 'markdown'
type = 'string'

[project.bases.ActionItem.fields.implementation_notes_user]
description = 'Human-authored implementation guidance for the agent.'
format = 'markdown'
type = 'string'

[project.bases.ActionItem.fields.last_failure_context]
description = 'Most recent failure detail — used by planner edits to inform fix directives.'
format = 'markdown'
type = 'string'

[project.bases.ActionItem.fields.objective]
description = 'What this item is trying to achieve, in prose.'
format = 'markdown'
type = 'string'

[project.bases.ActionItem.fields.owner]
description = 'Actor identity that gates state transitions on this item.'
type = 'string'

[project.bases.ActionItem.fields.packages]
description = 'Packages affected (sibling-blocking unit). Implementation-language-specific format.'
element_type = 'string'
type = 'array'

[project.bases.ActionItem.fields.paths]
description = 'File globs this item writes to. Planner fills; builder/QA read; sibling-blocking input.'
element_type = 'string'
type = 'array'

[project.bases.ActionItem.fields.persistent]
default = false
description = "True for retained anchor items that don't archive."
type = 'boolean'

[project.bases.ActionItem.fields.resource_refs]
description = 'External resource references (artifacts, services, files outside the repo).'
element_type = 'ResourceRef'
type = 'array'

[project.bases.ActionItem.fields.risk_notes]
format = 'markdown'
type = 'string'

[project.bases.ActionItem.fields.role]
description = 'Work-lane the action item runs in.'
enum = ['builder', 'qa-proof', 'qa-falsification', 'qa-a11y', 'qa-visual', 'design', 'commit', 'planner', 'research']
required = true
type = 'string'

[project.bases.ActionItem.fields.start_commit]
description = 'Commit hash at which in_progress started — git diff anchor.'
type = 'string'

[project.bases.ActionItem.fields.structural_type]
default = ''
description = 'Cascade structural classification. drop: L1 cascade root. segment: interior planner node. confluence: merge point. droplet: atomic build leaf. Empty for non-cascade containers.'
enum = ['', 'drop', 'segment', 'confluence', 'droplet']
type = 'string'

[project.bases.ActionItem.fields.transition_notes]
description = 'Notes captured at state transitions.'
format = 'markdown'
type = 'string'

[project.bases.ActionItem.fields.validation_plan]
description = 'How the work will be validated (tests, manual review, gates).'
format = 'markdown'
type = 'string'

[project.bases.NodeBase]
description = 'Common fields for any cascade node — shared by project, plans, discussions, drop-tree action items.'

[project.bases.NodeBase.fields]
[project.bases.NodeBase.fields.archived_at]
description = 'Set on transition to archived.'
type = 'datetime'

[project.bases.NodeBase.fields.blockers]
description = 'ta record ids of nodes that must reach state=complete before this node can transition todo→in_progress.'
element_type = 'string'
type = 'array'

[project.bases.NodeBase.fields.comments]
description = 'Embedded thread of comments on this node. Append-only.'
element_type = 'Comment'
type = 'array'

[project.bases.NodeBase.fields.completed_at]
description = 'Set on transition to complete or failed.'
type = 'datetime'

[project.bases.NodeBase.fields.created_at]
description = 'Creation timestamp (RFC3339).'
required = true
type = 'datetime'

[project.bases.NodeBase.fields.created_by_actor]
description = "Actor identity that created the node (e.g. 'agent:planner-1', 'user:ev')."
type = 'string'

[project.bases.NodeBase.fields.created_by_type]
description = 'Actor category.'
enum = ['user', 'agent', 'system']
type = 'string'

[project.bases.NodeBase.fields.depends_on]
description = 'Soft dependencies — referenced but not strictly blocking.'
element_type = 'string'
type = 'array'

[project.bases.NodeBase.fields.description]
description = 'Free prose describing the node. Markdown supported.'
format = 'markdown'
type = 'string'

[project.bases.NodeBase.fields.labels]
description = 'Free-form tag strings.'
element_type = 'string'
type = 'array'

[project.bases.NodeBase.fields.outcome]
default = ''
description = 'Set when reaching terminal state. Disambiguates complete-via-promotion from complete-via-rejection.'
enum = ['', 'success', 'failure', 'blocked']
type = 'string'

[project.bases.NodeBase.fields.parent_id]
description = 'ta record id of the parent node, or empty for root nodes.'
type = 'string'

[project.bases.NodeBase.fields.priority]
default = 'medium'
description = 'Operator-set priority hint.'
enum = ['low', 'medium', 'high']
type = 'string'

[project.bases.NodeBase.fields.related_items]
description = 'ta record ids related to this node for cross-reference.'
element_type = 'string'
type = 'array'

[project.bases.NodeBase.fields.started_at]
description = 'Set on transition to in_progress.'
type = 'datetime'

[project.bases.NodeBase.fields.state]
description = 'Lifecycle state. todo: not started. in_progress: actively being worked. complete: terminal success. failed: terminal failure. archived: soft-retired.'
enum = ['todo', 'in_progress', 'complete', 'failed', 'archived']
required = true
type = 'string'

[project.bases.NodeBase.fields.title]
description = 'Short headline for the node.'
required = true
type = 'string'

[project.bases.NodeBase.fields.updated_at]
description = 'Last-update timestamp (RFC3339).'
required = true
type = 'datetime'

[project.bases.NodeBase.fields.updated_by_actor]
description = 'Actor identity that last updated the node.'
type = 'string'

[project.bases.NodeBase.fields.updated_by_type]
enum = ['user', 'agent', 'system']
type = 'string'

[project.project]
description = 'The project itself. Single-record db (one project per repo).'
extends = 'NodeBase'

[project.project.fields]
[project.project.fields.build_tool]
description = 'Build/task tool the project uses.'
enum = ['mage', 'make', 'just', 'npm', 'yarn', 'pnpm', 'cargo', 'uv', 'other']
type = 'string'

[project.project.fields.color]
description = 'Optional color identifier.'
type = 'string'

[project.project.fields.current_focus]
description = 'ta record id of the active drop or plan.'
type = 'string'

[project.project.fields.dev_mcp_server_name]
description = 'MCP server name dispatched agents register against.'
type = 'string'

[project.project.fields.homepage]
description = 'Project homepage URL.'
type = 'string'

[project.project.fields.hylla_artifact_ref]
description = 'Optional Hylla artifact reference (e.g. github.com/org/repo@branch).'
type = 'string'

[project.project.fields.icon]
description = 'Optional icon identifier.'
type = 'string'

[project.project.fields.language]
description = 'Primary implementation language. Drives agent variant selection.'
enum = ['go', 'fe', 'rust', 'python', 'other']
type = 'string'

[project.project.fields.mission]
description = 'One-paragraph elevator pitch for the project.'
format = 'markdown'
type = 'string'

[project.project.fields.repo_bare_root]
description = 'Absolute path to bare repo (multi-worktree projects).'
type = 'string'

[project.project.fields.repo_primary_worktree]
description = 'Absolute path to the primary working tree — cd target for dispatched agents.'
type = 'string'

[project.project.fields.slug]
description = 'Short URL-safe project slug.'
required = true
type = 'string'

[project.project.fields.standards_markdown_id]
description = "ta record id of the AGENTS.md / CLAUDE.md section that holds the project's standards/conventions. Avoids duplicating prose between project.toml and the agent rules file."
type = 'string'

[project.project.fields.tags]
element_type = 'string'
type = 'array'

[project.project.fields.vocabulary]
description = 'Domain terms specific to this project, with definitions. Free-form key:string-value:string map.'
type = 'table'

[project.types]
[project.types.ChecklistItem]
description = 'One item in a structured checklist (start_criteria / completion_checklist / etc.).'

[project.types.ChecklistItem.fields]
[project.types.ChecklistItem.fields.complete]
default = false
description = 'Whether this item is satisfied.'
type = 'boolean'

[project.types.ChecklistItem.fields.id]
description = "Checklist-item identifier (caller-set, scoped to its parent action item's checklist)."
required = true
type = 'string'

[project.types.ChecklistItem.fields.text]
description = 'Item description.'
format = 'markdown'
required = true
type = 'string'

[project.types.Comment]
description = 'Append-only thread entry on any action item.'

[project.types.Comment.fields]
[project.types.Comment.fields.author]
description = "Actor identity that wrote the comment (e.g. 'agent:builder-1', 'user:ev')."
required = true
type = 'string'

[project.types.Comment.fields.body]
description = 'Comment content. Markdown — rendered for humans, raw for agents.'
format = 'markdown'
required = true
type = 'string'

[project.types.Comment.fields.id]
description = 'Comment identifier (caller-set; recommend ULID or short slug).'
required = true
type = 'string'

[project.types.Comment.fields.role]
description = 'Optional role context for the comment author.'
type = 'string'

[project.types.Comment.fields.timestamp]
description = 'When the comment was written (RFC3339).'
required = true
type = 'datetime'

[project.types.ContextBlock]
description = 'A piece of context an agent needs — code locations, URLs, doc refs, anything pointing at material relevant to the work.'

[project.types.ContextBlock.fields]
[project.types.ContextBlock.fields.body]
description = 'Optional inline content — preview / excerpt / commentary on the reference.'
format = 'markdown'
type = 'string'

[project.types.ContextBlock.fields.importance]
default = 'supporting'
description = 'How load-bearing this context is for the agent.'
enum = ['primary', 'supporting', 'tangential']
type = 'string'

[project.types.ContextBlock.fields.kind]
description = 'Discriminator — what KIND of context this block points at. code: file:line in this repo. url: external URL. doc: project doc reference. file: another local file. context7: a Context7 library/topic ref. other: anything else.'
enum = ['code', 'url', 'doc', 'file', 'context7', 'other']
required = true
type = 'string'

[project.types.ContextBlock.fields.label]
description = 'Human-readable label for the block.'
type = 'string'

[project.types.ContextBlock.fields.ref]
description = "The reference itself. Format depends on kind. code → 'path/to/file.go:42-58'. url → 'https://...'. doc → ta-record-id or markdown-section-id. file → relative path. context7 → 'library/topic'. other → free-form."
required = true
type = 'string'

[project.types.ResourceRef]
description = 'An external resource (artifact, service, file outside the repo) referenced by an action item.'

[project.types.ResourceRef.fields]
[project.types.ResourceRef.fields.kind]
enum = ['artifact', 'service', 'file', 'url', 'other']
required = true
type = 'string'

[project.types.ResourceRef.fields.label]
type = 'string'

[project.types.ResourceRef.fields.notes]
format = 'markdown'
type = 'string'

[project.types.ResourceRef.fields.ref]
description = 'The reference. Format depends on kind.'
required = true
type = 'string'

[readme]
description = 'Project README — humans entry point. Sections addressable via ta.'
paths = ['README.md']

[readme.section]
description = 'An H2 section of README.md.'
heading = 2

[readme.section.fields]
[readme.section.fields.body]
format = 'markdown'
type = 'string'

[security]
description = 'Security policy. Sections addressable.'
paths = ['SECURITY.md']

[security.section]
description = 'An H2 section of SECURITY.md.'
heading = 2

[security.section.fields]
[security.section.fields.body]
format = 'markdown'
type = 'string'
