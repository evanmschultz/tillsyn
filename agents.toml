# agents.example.toml — Tillsyn runtime-config example (Drop 4c.6 W1.D1 fixture).
#
# Copied to <project>/agents.toml by `till init` (Drop 4c.6 W2). Adopters
# customize per project; an optional gitignored agents.local.toml deep-merges
# OVER this file at spawn time per SKETCH.md § 4.3 / § 5.
#
# Schema source-of-truth: workflow/drop_4c_6/SKETCH.md § 4 — top-level [agents]
# defaults block + per-kind override blocks with field-level inheritance. The
# values below match SKETCH.md § 4.1 + § 4.2 sane Anthropic-direct defaults:
#
#   - Planner + builder default to sonnet (cascade-dogfooding speed/cost).
#   - QA pair (proof + falsification, plan-side + build-side) runs opus
#     (deeper falsification + proof reasoning warrants the bigger model).
#   - Commit-message-agent runs haiku (cheap+fast commit message generation).
#   - tools_allow per kind enumerates the explicit closed set the agent may
#     reach for; tools_deny stays empty by default — adopters add deny-list
#     entries when their security model requires a hardcoded floor.
#
# This fixture is loader-validated by Drop 4c.6 W0 once W0 lands; W1.D1 ships
# the file but does NOT exercise the loader (chicken/egg avoided per the
# droplet RiskNotes).

[agents]
# Defaults every cascade kind inherits from. Per-kind blocks below override
# only the fields they care about; absent fields fall through to these
# defaults via field-level inheritance per SKETCH.md § 4.2.1.
client = "claude"
model = "claude-sonnet-4-6"
effort = "medium"
max_tries = 3
max_budget_usd = 5.0
max_turns = 50
blocked_retries = 0
blocked_retry_cooldown = "30s"
auto_push = false
env_set = {}
env_from_shell = { ANTHROPIC_API_KEY = "ANTHROPIC_API_KEY" }
cli_args = []
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP"]
tools_deny = []
claude_md_addons = []

# -----------------------------------------------------------------------------
# Per-kind overrides — cascade-dogfooding model assignments per SKETCH.md § 4.2.
# Planner + builder run sonnet (inherited from [agents]); QA pair runs opus;
# commit-message-agent runs haiku.
# -----------------------------------------------------------------------------

[agents.plan]
# Planner inherits model = sonnet from [agents]. Bigger budget + turn cap
# because decomposition + plan-down work consumes more tokens than typical
# cascade work.
max_budget_usd = 8.0
max_turns = 80
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__plugin_context7_context7__resolve-library-id", "mcp__plugin_context7_context7__query-docs", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

[agents.build]
# Builder inherits model = sonnet from [agents]. Adds Edit + Write to the
# tool surface — builder is the only role that mutates code.
tools_allow = ["Read", "Edit", "Write", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

# QA agents run on opus — deeper falsification + proof reasoning warrants the
# bigger model. NO Edit / Write — QA is read-only by structural rule.
[agents.plan-qa-proof]
model = "claude-opus-4-7"
max_budget_usd = 4.0
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

[agents.plan-qa-falsification]
model = "claude-opus-4-7"
max_budget_usd = 4.0
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

[agents.build-qa-proof]
model = "claude-opus-4-7"
max_budget_usd = 3.0
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

[agents.build-qa-falsification]
model = "claude-opus-4-7"
max_budget_usd = 3.0
tools_allow = ["Read", "Grep", "Glob", "Bash", "LSP", "mcp__tillsyn__till_action_item", "mcp__tillsyn__till_comment"]

[agents.research]
# Research inherits model = sonnet from [agents]. Smaller budget — research
# is read-only investigation that should fit in a single comment.
max_budget_usd = 3.0

[agents.commit]
# Commit-message-agent runs haiku — cheap+fast commit message generation.
# Tools are minimal: Read for diff context, Bash for `git diff` / `git log`.
model = "claude-haiku-4-5-20251001"
max_budget_usd = 0.10
max_turns = 5
tools_allow = ["Read", "Bash"]

# ---
# D6 OLLAMA PROFILE (Drop 4d multi-backend support)
# ---
# To use ollama-backed claude spawns (claude -p with OpenAI-compat API):
#
#   1. Start ollama: `ollama serve` (listens on http://localhost:11434/v1)
#   2. Pull a model: `ollama pull llama3:latest`
#   3. Set shell env (option A — recommended for secrets):
#      export ANTHROPIC_BASE_URL=http://localhost:11434/v1
#      export ANTHROPIC_AUTH_TOKEN=ollama
#   4. Dispatch with: till dispatch <kind> --binding go-builder-ollama
#
# Option A — Use shell env vars (recommended; no secrets in TOML):
# [agents.build]
# env_from_shell = { ANTHROPIC_BASE_URL = "ANTHROPIC_BASE_URL", ANTHROPIC_AUTH_TOKEN = "ANTHROPIC_AUTH_TOKEN" }

# Option B — Use literal values in TOML (for localhost dev-only):
# [agents.build]
# [agents.build.env_set]
# ANTHROPIC_BASE_URL = "http://localhost:11434/v1"
# ANTHROPIC_AUTH_TOKEN = "ollama"
